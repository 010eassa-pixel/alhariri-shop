<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard - الحريري</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;direction:rtl;margin:0;background:#eee}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{padding:20px}
input{padding:5px;margin:5px}
button{padding:5px 10px;cursor:pointer}
.box{background:#fff;padding:10px;margin:10px;border-radius:8px}
</style>
</head>

<body>

<header>
<h2>Dashboard - الحريري</h2>
</header>

<div class="container">

<h3>➕ إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<button onclick="addProduct()">إضافة</button>

<h3>📦 المنتجات</h3>
<div id="list"></div>

<h3>📑 الطلبات</h3>
<div id="orders"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;

products.push({name,price});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function render(){
let list = document.getElementById("list");
list.innerHTML = "";

products.forEach((p,i)=>{
list.innerHTML += `<div class="box">${p.name} - ${p.price} جنيه</div>`;
});

let orders = JSON.parse(localStorage.getItem("orders")) || [];
let oBox = document.getElementById("orders");
oBox.innerHTML = "";

orders.forEach(o=>{
oBox.innerHTML += `<div class="box">${o.name} - ${o.price}</div>`;
});
}

render();
</script>

</body>
</html>
