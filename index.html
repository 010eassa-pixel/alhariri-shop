<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الحريري - المتجر</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;direction:rtl;margin:0;background:#f5f5f5}
header{background:#000;color:#fff;padding:15px;text-align:center}
.container{padding:20px}
.product{background:#fff;margin:10px;padding:10px;border-radius:8px}
button{padding:5px 10px;cursor:pointer}
</style>
</head>

<body>

<header>
<h2>متجر الحريري</h2>
</header>

<div class="container">
<h3>🛒 المنتجات</h3>
<div id="products"></div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function render(){
let box = document.getElementById("products");
box.innerHTML = "";

products.forEach((p,i)=>{
box.innerHTML += `
<div class="product">
<h4>${p.name}</h4>
<p>${p.price} جنيه</p>
<button onclick="order(${i})">اطلب</button>
</div>`;
});
}

function order(i){
let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(products[i]);
localStorage.setItem("orders", JSON.stringify(orders));
alert("تم الطلب بنجاح");
}

render();
</script>

</body>
</html>
